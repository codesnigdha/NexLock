<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLock Signup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <div class="logo"><a href="index.html"><img src="assets/logo.png"></a></div>
        <!-- Hamburger Icon -->
        <div class="hamburger" onclick="toggleSidebar()">☰</div>
        <!-- Desktop Nav -->
        <nav id="navbarLinks"></nav>
        <!-- Sidebar (for mobile) -->
        <div id="sidebar" class="sidebar">
            <!-- Close Button -->
            <span class="cross" onclick="toggleSidebar()">✕</span>
            <!-- The Links/Buttons will be injected here via JavaScript -->
            <div id="sidebarContent">
                <!-- JS will populate these -->
            </div>
        </div>
    </header>

    <!-- FORM SECTION -->
    <div class="form">
        <div class="container">

            <h2>Create NexLock Account</h2>

            <input type="text" id="name" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <input type="date" id="dob" required>

            <button onclick="signup()">Create Account</button>

            <div class="login-signup">
                Already have an account?
                <a href="login.html">Login</a>
            </div>
        </div>

    </div>


    <!-- FOOTER -->

    <footer class="footer">
        <div class="footer-container">

            <!-- BRAND -->
            <div class="footer-brand">
                <div class="footer-logo">
                    <a href="index.html">
                        <img src="assets/logo.png" alt="NexLock Logo">
                    </a>
                </div>

                <p>
                    Secure password generation and analysis tools
                    for better digital security.
                </p>
            </div>

            <div class="footer-grid">
                <!-- PRODUCT -->
                <div class="footer-section">
                    <h3>Product</h3>
                    <a href="#" onclick="goToGenerate()">Generate</a>
                    <a href="#" onclick="goToAnalyze()">Analyze</a>
                    <a href="#" onclick="goToDashboard()">Dashboard</a>
                </div>

                <!-- NAVIGATION -->
                <div class="footer-section">
                    <h3>Navigation</h3>
                    <a href="index.html">Home</a>
                    <a href="#" onclick="goToDashboard()">Dashboard</a>

                    <!-- Social Icons -->
                    <div class="social-icons">
                        <a href="https://instagram.com/" target="_blank">
                            <i class="fa-brands fa-instagram"></i>
                        </a>

                        <a href="https://linkedin.com/" target="_blank">
                            <i class="fa-brands fa-linkedin"></i>
                        </a>

                        <a href="https://facebook.com/" target="_blank">
                            <i class="fa-brands fa-facebook"></i>
                        </a>

                        <a href="https://youtube.com/" target="_blank">
                            <i class="fa-brands fa-youtube"></i>
                        </a>

                        <a href="https://twitter.com/" target="_blank">
                            <i class="fa-brands fa-x-twitter"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM -->
        <div class="footer-bottom">
            <p>Copyright <span>&copy;</span> 2026 NexLock. Built for better password security.</p>
        </div>
    </footer>


    <!-- SCRIPT -->
    <script src="js/auth-check.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
